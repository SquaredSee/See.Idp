services:
  postgres:
    image: postgres:16
    container_name: see-idp-postgres
    environment:
      POSTGRES_USER: seeidp
      POSTGRES_PASSWORD: seeidp_dev_pw
      POSTGRES_DB: seeidp
    ports:
      - "5432:5432"
    volumes:
      - seeidp_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: see-idp-redis
    ports:
      - "6379:6379"

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: see-idp-otel-lgtm
    ports:
      - "3000:3000" # Grafana UI  (admin / admin)
      - "4317:4317" # OTLP gRPC  (traces, metrics, logs)
      - "4318:4318" # OTLP HTTP

  client-web:
    build:
      context: ./clients/See.Client.Web
      dockerfile: Dockerfile
    container_name: see-client-web
    ports:
      - "7002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Oidc__Authority=http://see-idp-web:8080
      - Oidc__ClientId=see-client-web
      - Oidc__ClientSecret=see-client-web-secret

volumes:
  seeidp_postgres_data:
