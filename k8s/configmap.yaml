apiVersion: v1
kind: ConfigMap
metadata:
  name: seeidp-config
  namespace: seeidp
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  # Redis is in the same namespace; no secret needed for the address.
  ConnectionStrings__Redis: "seeidp-redis:6379"
  # Disable automatic seeding after the first deployment.
  # Set to "true" temporarily when bootstrapping a new environment.
  Initialization__Enabled: "false"
  # Set to your cluster pod CIDR so X-Forwarded-For is trusted only from the ingress.
  # Example: "10.244.0.0/16" for Flannel, "192.168.0.0/16" for Calico.
  # Multiple CIDRs can be set via separate env vars: REVERSEPROXY__TRUSTEDNETWORKS__0, __1, etc.
  # REVERSEPROXY__TRUSTEDNETWORKS__0: "10.244.0.0/16"
